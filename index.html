<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Round Table Sneaky Hands TrialRun</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="Game status">
        <div>
          <h1>Round Table Sneaky Hands</h1>
          <p>Two hands, one quiet table, very nervous snacks.</p>
        </div>
        <div class="scoreboard" aria-live="polite">
          <div class="score-card p1">
            <span>P1</span>
            <strong id="p1Score">0</strong>
          </div>
          <div class="score-card p2">
            <span>P2</span>
            <strong id="p2Score">0</strong>
          </div>
          <button id="resetButton" type="button">Reset</button>
        </div>
      </section>

      <section class="stage-wrap">
        <canvas
          id="gameCanvas"
          width="960"
          height="640"
          aria-label="Top-down round table game canvas"
        ></canvas>
        <div id="roundBanner" class="round-banner" aria-live="assertive"></div>
      </section>

      <section class="control-deck" aria-label="Touch controls">
        <div class="touch-pad">
          <span>P1 lane</span>
          <button class="hold-button p1-button" data-hold="p1" aria-label="Hold to advance P1">
            Hold P1
          </button>
        </div>
        <div id="message" class="message" aria-live="polite">
          Right-click and hold near a hand lane to advance. Release to pull back.
        </div>
        <div class="touch-pad">
          <span>P2 lane</span>
          <button class="hold-button p2-button" data-hold="p2" aria-label="Hold to advance P2">
            Hold P2
          </button>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
