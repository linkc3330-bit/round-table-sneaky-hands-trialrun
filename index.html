<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sneaky Hands Sightline Animation</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="anim-shell">
      <section class="status-bar" aria-label="Animation status">
        <div class="brand">
          <span class="brand-mark">Sneaky<br />Hands</span>
          <div>
            <h1>Sightline Scare Study</h1>
            <p>Autoplay diagram. No player controls. Notes 1-4 show sightline, pause, recheck, and chain movement.</p>
          </div>
        </div>
        <div class="phase-panel" aria-live="polite">
          <span>Phase</span>
          <strong id="phaseLabel">Sightlines</strong>
        </div>
      </section>

      <section class="board-frame">
        <canvas
          id="gameCanvas"
          width="1000"
          height="720"
          aria-label="Autoplay animation explaining animal sightlines, retreat pause, direction recheck, and chain movement"
        ></canvas>
        <div id="roundBanner" class="round-banner" aria-live="assertive"></div>
      </section>

      <section class="caption-strip" aria-label="Animation caption">
        <div id="message" class="message" aria-live="polite">
          Animals watch nearby lanes, retreat briefly, wait, recheck direction, and can bump into each other.
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
